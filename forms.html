<!-- Form Modals & Styling -->
<style>
.form-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.form-container {
  background: #fff;
  border-radius: 8px;
  padding: 32px;
  max-width: 500px;
  width: 90%;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
}

.form-close {
  position: absolute;
  top: 12px;
  right: 12px;
  background: none;
  border: none;
  font-size: 24px;
  color: #666;
  cursor: pointer;
  padding: 0;
  width: 32px;
  height: 32px;
}

.form-close:hover {
  color: #e31b23;
}

.form-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 2px;
  margin-bottom: 8px;
  color: #000;
}

.form-subtitle {
  color: #666;
  font-size: 14px;
  margin-bottom: 24px;
  line-height: 1.5;
}

.form-group {
  margin-bottom: 18px;
}

.form-group label {
  display: block;
  font-family: 'Oswald', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: #000;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.form-group input[type="text"],
.form-group input[type="email"],
.form-group input[type="tel"],
.form-group input[type="number"],
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #ddd;
  border-radius: 4px;
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  color: #333;
}

.form-group textarea {
  resize: vertical;
  min-height: 80px;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: #e31b23;
  box-shadow: 0 0 0 2px rgba(227, 27, 35, 0.1);
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.form-group.full-width {
  grid-column: 1 / -1;
}

.form-file-group {
  position: relative;
}

.form-file-input {
  display: none;
}

.form-file-label {
  display: block;
  padding: 12px;
  border: 2px dashed #ddd;
  border-radius: 4px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 13px;
  color: #666;
}

.form-file-label:hover {
  border-color: #e31b23;
  background: rgba(227, 27, 35, 0.05);
}

.form-file-input:checked ~ .form-file-label {
  border-color: #e31b23;
}

.form-status {
  padding: 12px;
  border-radius: 4px;
  margin-bottom: 16px;
  display: none;
  text-align: center;
}

.form-status.active {
  display: block;
}

.form-status.success {
  background: #d4edda;
  color: #155724;
  border: 1px solid #c3e6cb;
}

.form-status.error {
  background: #f8d7da;
  color: #721c24;
  border: 1px solid #f5c6cb;
}

.form-submit {
  width: 100%;
  padding: 14px;
  background: #000;
  color: #fff;
  border: none;
  border-radius: 4px;
  font-family: 'Oswald', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 16px;
}

.form-submit:hover:not(:disabled) {
  background: #e31b23;
}

.form-submit:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.required {
  color: #e31b23;
}

@media (max-width: 640px) {
  .form-container {
    padding: 20px;
  }
  
  .form-title {
    font-size: 22px;
  }
  
  .form-row {
    grid-template-columns: 1fr;
  }
}
</style>

<!-- Full Service Form Modal -->
<div id="fullServiceModal" class="form-modal">
  <div class="form-container">
    <button class="form-close" data-close-modal aria-label="Close">×</button>
    <h2 class="form-title">Get Your Free Proof</h2>
    <p class="form-subtitle">Submit your design or specifications for a custom proof.</p>
    
    <form id="fullServiceForm">
      <div class="form-status">⏳ Processing...</div>
      
      <div class="form-group">
        <label>Name <span class="required">*</span></label>
        <input type="text" name="name" required>
      </div>

      <div class="form-group">
        <label>Email <span class="required">*</span></label>
        <input type="email" name="email" required>
      </div>

      <div class="form-group">
        <label>Phone <span class="required">*</span></label>
        <input type="tel" name="phone" required>
      </div>

      <div class="form-group">
        <label>Street Address <span class="required">*</span></label>
        <input type="text" name="streetAddress" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>City <span class="required">*</span></label>
          <input type="text" name="city" required>
        </div>
        <div class="form-group">
          <label>State <span class="required">*</span></label>
          <input type="text" name="state" placeholder="TX" maxlength="2" required>
        </div>
      </div>

      <div class="form-group">
        <label>ZIP Code <span class="required">*</span></label>
        <input type="text" name="zip" required>
      </div>

      <div class="form-group">
        <label>Company</label>
        <input type="text" name="company">
      </div>

      <div class="form-group">
        <label>Service Type <span class="required">*</span></label>
        <select name="serviceType" required>
          <option value="">Select a service...</option>
          <option value="Custom Design">Custom Design</option>
          <option value="Bulk Order">Bulk Order</option>
          <option value="Rush Production">Rush Production</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Quantity <span class="required">*</span></label>
        <input type="number" name="quantity" min="1" required>
      </div>

      <div class="form-group">
        <label>Special Instructions</label>
        <textarea name="instructions" placeholder="Any special requirements or notes..."></textarea>
      </div>

      <div class="form-group">
        <label>Upload Files (Logos, Design Files)</label>
        <input type="file" name="files" id="fullServiceFiles" multiple accept=".png,.jpg,.jpeg,.svg,.pdf,.ai,.eps">
        <label for="fullServiceFiles" class="form-file-label">
          📎 Click to upload files or drag & drop<br>
          <small>PNG, JPG, SVG, PDF (max 10MB each, 75MB total)</small>
        </label>
      </div>

      <button type="submit" class="form-submit">Submit Order</button>
    </form>
  </div>
</div>

<!-- DIY Form Modal -->
<div id="diyModal" class="form-modal">
  <div class="form-container">
    <button class="form-close" data-close-modal aria-label="Close">×</button>
    <h2 class="form-title">DIY Design Proof</h2>
    <p class="form-subtitle">Submit your custom design and we'll create a proof for you.</p>
    
    <form id="diyForm">
      <div class="form-status">⏳ Processing...</div>
      
      <div class="form-group">
        <label>Name <span class="required">*</span></label>
        <input type="text" name="name" required>
      </div>

      <div class="form-group">
        <label>Email <span class="required">*</span></label>
        <input type="email" name="email" required>
      </div>

      <div class="form-group">
        <label>Phone <span class="required">*</span></label>
        <input type="tel" name="phone" required>
      </div>

      <div class="form-group">
        <label>Quantity <span class="required">*</span></label>
        <input type="number" name="quantity" min="1" required>
      </div>

      <div class="form-group">
        <label>Design Mockup (PNG) <span class="required">*</span></label>
        <input type="file" name="previewPng" id="diyPreview" accept=".png" required>
        <label for="diyPreview" class="form-file-label">
          📎 Click to upload your mockup<br>
          <small>PNG format, max 10MB</small>
        </label>
      </div>

      <div class="form-group">
        <label>Logo Files</label>
        <input type="file" name="logos" id="diyLogos" multiple accept=".png,.jpg,.jpeg,.svg">
        <label for="diyLogos" class="form-file-label">
          📎 Upload logos or supporting files<br>
          <small>PNG, JPG, SVG (optional, max 10MB each)</small>
        </label>
      </div>

      <div class="form-group">
        <label>Design JSON (Optional)</label>
        <textarea name="designJson" placeholder='{"layers": [...], "colors": [...]}' style="font-family: monospace; font-size: 12px;"></textarea>
      </div>

      <button type="submit" class="form-submit">Submit Design</button>
    </form>
  </div>
</div>
